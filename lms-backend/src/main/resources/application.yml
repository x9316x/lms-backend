spring:
  datasource:
    url: jdbc:h2:file:./.h2/lms;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2
  flyway:
    enabled: false

app:
  jwt:
    secret: "CHANGE_ME_TO_A_LONG_RANDOM_SECRET_at_least_64_chars__________________________"
    accessTtlMinutes: 30
    refreshTtlDays: 7
